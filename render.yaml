services:
  - type: web
    name: paws-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "paws-backend.onrender.com"
      - key: DATABASE_URL
        value: "postaviti-neon-connection-string-ovde"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://paws-app.vercel.app"
