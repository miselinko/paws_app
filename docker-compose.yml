services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paws_db
      POSTGRES_USER: paws_user
      POSTGRES_PASSWORD: paws_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paws_user -d paws_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DB_NAME: paws_db
      DB_USER: paws_user
      DB_PASSWORD: paws_password
      DB_HOST: db
      DB_PORT: "5432"
      ADMIN_EMAIL: admin@paws.rs
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_BACKEND_URL: http://localhost:8000

volumes:
  postgres_data:
